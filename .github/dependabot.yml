version: 2
updates:
  # GitHub Actions：每周更新所有 workflow 中的 action 版本（含 pypa/cibuildwheel）
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  # TA-Lib Python/C 版本由 .github/workflows/update-talib-versions.yml 每周检查并开 PR
  # Python 构建目标（CIBW_BUILD）由 .github/workflows/update-python-versions.yml 每周更新
  # 两者均直接修改 talib.yml 中的 env 变量，合并 PR 后 push 触发器自动构建发布
