name: Build Package A

on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号 (例如 1.0.0)"
        required: true
        type: string

env:
  PACKAGE_NAME: a
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build pure-Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 设置版本号
        working-directory: packages/a
        run: |
          sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" pyproject.toml
          sed -i "s/^__version__ = .*/__version__ = \"${{ inputs.version }}\"/" a/__init__.py

      - name: 构建 wheel 和 sdist
        working-directory: packages/a
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ env.PACKAGE_NAME }}
          path: packages/a/dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ env.PACKAGE_NAME }}
          path: dist

      - name: 生成 SHA256 校验
        run: |
          cd dist && sha256sum * > SHA256SUMS && cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.PACKAGE_NAME }}-v${{ inputs.version }}
          name: "${{ env.PACKAGE_NAME }} v${{ inputs.version }}"
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS

  update-index:
    needs: release
    uses: ./.github/workflows/update-index.yml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write

