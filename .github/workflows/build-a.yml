name: Build Package A

on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号 (例如 1.0.0)"
        required: true
        type: string

env:
  PACKAGE_NAME: a
  RELEASE_TAG: a
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: 设置版本号 (Linux)
        if: runner.os == 'Linux'
        run: |
          sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" packages/a/pyproject.toml
          sed -i "s/^__version__ = .*/__version__ = \"${{ inputs.version }}\"/" packages/a/a/__init__.py

      - name: 设置版本号 (Windows)
        if: runner.os == 'Windows'
        shell: python
        run: |
          import pathlib
          import re

          for rel_path, pattern, replacement in [
              ('packages/a/pyproject.toml', r'^version = .*', 'version = "${{ inputs.version }}"'),
              ('packages/a/a/__init__.py', r'^__version__ = .*', '__version__ = "${{ inputs.version }}"'),
          ]:
              path = pathlib.Path(rel_path)
              path.write_text(
                  re.sub(pattern, replacement, path.read_text(encoding='utf-8'), flags=re.MULTILINE),
                  encoding='utf-8',
              )

      - name: 构建 wheel
        run: |
          pip install build
          python -m build --wheel --outdir wheelhouse packages/a

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ env.PACKAGE_NAME }}-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: 设置版本号
        run: |
          sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" packages/a/pyproject.toml
          sed -i "s/^__version__ = .*/__version__ = \"${{ inputs.version }}\"/" packages/a/a/__init__.py

      - name: 构建 sdist
        run: |
          pip install build
          python -m build --sdist --outdir dist packages/a

      - uses: actions/upload-artifact@v7
        with:
          name: sdist-${{ env.PACKAGE_NAME }}
          path: dist/*.tar.gz

  release:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-${{ env.PACKAGE_NAME }}-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v8
        with:
          name: sdist-${{ env.PACKAGE_NAME }}
          path: dist

      - name: 删除旧 Release 与 Tag
        uses: actions/github-script@v9
        env:
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const packageName = process.env.PACKAGE_NAME;
            const stableTag = process.env.RELEASE_TAG;

            function shouldDelete(tag) {
              return tag === stableTag || tag === `${packageName}-latest` || tag.startsWith(`${packageName}-v`);
            }

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            for (const release of releases) {
              const tag = release.tag_name;
              if (!shouldDelete(tag)) {
                continue;
              }
              await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id });
              core.info(`Deleted release for ${tag}`);
            }

            const { data: refs } = await github.rest.git.listMatchingRefs({
              owner,
              repo,
              ref: `tags/${packageName}`,
            });

            for (const ref of refs) {
              const tag = ref.ref.replace('refs/tags/', '');
              if (!shouldDelete(tag)) {
                continue;
              }
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Deleted tag ${tag}`);
            }

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: "${{ env.PACKAGE_NAME }} v${{ inputs.version }}"
          overwrite_files: true
          files: |
            dist/*.whl
            dist/*.tar.gz

  update-index:
    needs: release
    uses: ./.github/workflows/update-index.yml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write

