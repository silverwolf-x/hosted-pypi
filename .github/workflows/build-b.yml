name: Build Package B

on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号 (例如 2.1.1)"
        required: true
        type: string

env:
  PACKAGE_NAME: b
  CIBW_BUILD: "cp310-* cp311-* cp312-*"
  CIBW_SKIP: "*-musllinux_*"
  CIBW_BUILD_VERBOSITY: 2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_linux:
    name: Build Linux x86_64 wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: 设置版本号
        run: |
          sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" packages/b/pyproject.toml
          sed -i "s/^__version__ = .*/__version__ = \"${{ inputs.version }}\"/" packages/b/b/__init__.py

      - uses: pypa/cibuildwheel@v3.2.1
        with:
          package-dir: packages/b
          output-dir: wheelhouse
        env:
          CIBW_ARCHS_LINUX: x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ env.PACKAGE_NAME }}-linux
          path: ./wheelhouse/*.whl

  build_windows:
    name: Build Windows AMD64 wheels
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: 设置版本号
        shell: python
        run: |
          import pathlib, re
          for fpath, pat, rep in [
              ("packages/b/pyproject.toml",   r'^version = ".*"',      'version = "${{ inputs.version }}"'),
              ("packages/b/b/__init__.py",     r'^__version__ = ".*"',  '__version__ = "${{ inputs.version }}"'),
          ]:
              p = pathlib.Path(fpath)
              p.write_text(re.sub(pat, rep, p.read_text(), flags=re.M))

      - uses: pypa/cibuildwheel@v3.2.1
        with:
          package-dir: packages/b
          output-dir: wheelhouse
        env:
          CIBW_ARCHS_WINDOWS: AMD64

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ env.PACKAGE_NAME }}-windows
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 设置版本号
        run: |
          sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" packages/b/pyproject.toml
          sed -i "s/^__version__ = .*/__version__ = \"${{ inputs.version }}\"/" packages/b/b/__init__.py

      - name: 构建 sdist
        run: |
          pip install build
          python -m build --sdist --outdir dist packages/b

      - uses: actions/upload-artifact@v4
        with:
          name: sdist-${{ env.PACKAGE_NAME }}
          path: dist/*.tar.gz

  release:
    needs: [build_linux, build_windows, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-${{ env.PACKAGE_NAME }}-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: sdist-${{ env.PACKAGE_NAME }}
          path: dist

      - name: 生成 SHA256 校验
        run: |
          cd dist && sha256sum * > SHA256SUMS && cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.PACKAGE_NAME }}-v${{ inputs.version }}
          name: "${{ env.PACKAGE_NAME }} v${{ inputs.version }}"
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS

  update-index:
    needs: release
    uses: ./.github/workflows/update-index.yml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write

