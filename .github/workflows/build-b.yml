name: Build Package B

on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号 (例如 2.1.1)"
        required: true
        type: string

env:
  PACKAGE_NAME: b
  # CPython 最新3个大版本，每年10月新版发布后滚动更新
  CIBW_BUILD: "cp312-* cp313-* cp314-*"
  CIBW_SKIP: "*-musllinux_*"
  CIBW_BUILD_VERBOSITY: 2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: 设置版本号 (Linux)
        if: runner.os == 'Linux'
        run: |
          sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" packages/b/pyproject.toml

      - name: 设置版本号 (Windows)
        if: runner.os == 'Windows'
        shell: python
        run: |
          import re, pathlib
          p = pathlib.Path('packages/b/pyproject.toml')
          p.write_text(re.sub(
              r'^version = .*',
              'version = "${{ inputs.version }}"',
              p.read_text(encoding='utf-8'),
              flags=re.MULTILINE,
          ), encoding='utf-8')

      - uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: packages/b
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ env.PACKAGE_NAME }}-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: 设置版本号
        run: |
          sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" packages/b/pyproject.toml

      - name: 构建 sdist
        run: |
          pip install build
          python -m build --sdist --outdir dist packages/b

      - uses: actions/upload-artifact@v7
        with:
          name: sdist-${{ env.PACKAGE_NAME }}
          path: dist/*.tar.gz

  release:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-${{ env.PACKAGE_NAME }}-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v8
        with:
          name: sdist-${{ env.PACKAGE_NAME }}
          path: dist

      - name: 生成 SHA256 校验
        run: cd dist && sha256sum * > SHA256SUMS && cat SHA256SUMS

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.PACKAGE_NAME }}-v${{ inputs.version }}
          name: "${{ env.PACKAGE_NAME }} v${{ inputs.version }}"
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS

  update-index:
    needs: release
    uses: ./.github/workflows/update-index.yml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write

