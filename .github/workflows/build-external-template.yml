name: "[模板] 外部构建包上传"

# ============================================================
# 适用场景：
#   - 类似 https://github.com/cgohlke/talib-build 的构建模式
#   - pyproject.toml 在仓库根目录，没有 packages/ 子目录
#   - 构建依赖自定义脚本、vendored C 库或复杂编译步骤
#
# 使用方法：
#   1. 复制本文件，改名为 build-<你的包名>.yml
#   2. 修改 env.PACKAGE_NAME
#   3. 在各 job 的 "=== 你的构建步骤 ===" 区域填入构建逻辑
# ============================================================

on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号 (例如 1.0.0)"
        required: true
        type: string

env:
  PACKAGE_NAME: "mypackage"      # ← 改成你的包名
  CIBW_BUILD: "cp310-* cp311-* cp312-*"
  CIBW_SKIP: "*-musllinux_*"
  CIBW_BUILD_VERBOSITY: 2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_linux:
    name: Build Linux x86_64 wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # === 你的构建步骤（Linux）===
      # - name: 编译 C 库
      #   run: |
      #     wget https://example.com/mylib.tar.gz
      #     tar xf mylib.tar.gz && cd mylib
      #     ./configure --prefix=/usr/local && make install

      - name: 设置版本号
        run: sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" pyproject.toml

      - uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_ARCHS_LINUX: x86_64
          # CIBW_ENVIRONMENT: MY_LIB_PATH="/usr/local/lib"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ env.PACKAGE_NAME }}-linux
          path: ./wheelhouse/*.whl

  build_windows:
    name: Build Windows AMD64 wheels
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      # === 你的构建步骤（Windows）===
      # - name: 编译 C 库
      #   run: .\build.cmd
      #   shell: cmd

      - name: 设置版本号
        shell: python
        run: |
          import pathlib, re
          p = pathlib.Path("pyproject.toml")
          txt = p.read_text()
          txt = re.sub(r'^version = ".*"', 'version = "${{ inputs.version }}"', txt, flags=re.M)
          p.write_text(txt)

      - uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_ARCHS_WINDOWS: AMD64
          # CIBW_ENVIRONMENT_WINDOWS: "MY_LIB_PATH='C:\\mylib'"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ env.PACKAGE_NAME }}-windows
          path: ./wheelhouse/*.whl

  release:
    needs: [build_linux, build_windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-${{ env.PACKAGE_NAME }}-*
          merge-multiple: true
          path: dist

      - name: 生成 SHA256 校验
        run: |
          cd dist && sha256sum *.whl > SHA256SUMS && cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.PACKAGE_NAME }}-v${{ inputs.version }}
          name: "${{ env.PACKAGE_NAME }} v${{ inputs.version }}"
          files: |
            dist/*.whl
            dist/SHA256SUMS

  update-index:
    needs: release
    uses: ./.github/workflows/update-index.yml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write
