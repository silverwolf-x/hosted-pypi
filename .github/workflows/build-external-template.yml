name: "[模板] 外部构建包上传"

# ============================================================
# 适用场景：
#   - 类似 https://github.com/cgohlke/talib-build 的构建模式
#   - pyproject.toml 在仓库根目录，没有 packages/ 子目录
#   - 构建依赖自定义脚本、vendored C 库或复杂编译步骤
#
# 使用方法：
#   1. 复制本文件，改名为 build-<你的包名>.yml
#   2. 修改 env.PACKAGE_NAME
#   3. 在 build_wheels job 的 "=== 你的构建步骤 ===" 区域填入构建逻辑
# ============================================================

on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号 (例如 1.0.0)"
        required: true
        type: string

env:
  PACKAGE_NAME: "mypackage"      # ← 改成你的包名
  RELEASE_TAG: "mypackage"       # ← 保持稳定 tag，并在每次构建时重新指向最新 commit
  # CPython 最新3个大版本，每年10月新版发布后滚动更新
  CIBW_BUILD: "cp311-* cp312-* cp313-*"
  CIBW_SKIP: "*-musllinux_*"
  CIBW_BUILD_VERBOSITY: 2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
    env:
      CIBW_ARCHS_LINUX: x86_64
      CIBW_ARCHS_WINDOWS: AMD64
      # 强制单 manylinux 标签，文件名干净
      CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
        auditwheel repair --plat manylinux_2_28_x86_64 -w {dest_dir} {wheel}

    steps:
      - uses: actions/checkout@v6

      # === 你的构建步骤（Linux）===
      # - name: 编译 C 库 (Linux)
      #   if: runner.os == 'Linux'
      #   run: |
      #     wget https://example.com/mylib.tar.gz
      #     tar xf mylib.tar.gz && cd mylib
      #     ./configure --prefix=/usr/local && make install

      # === 你的构建步骤（Windows）===
      # - name: 编译 C 库 (Windows)
      #   if: runner.os == 'Windows'
      #   shell: cmd
      #   run: .\build.cmd

      - name: 设置版本号 (Linux)
        if: runner.os == 'Linux'
        run: sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" pyproject.toml

      - name: 设置版本号 (Windows)
        if: runner.os == 'Windows'
        shell: python
        run: |
          import re, pathlib
          p = pathlib.Path('pyproject.toml')
          p.write_text(re.sub(
              r'^version = .*',
              'version = "${{ inputs.version }}"',
              p.read_text(encoding='utf-8'),
              flags=re.MULTILINE,
          ), encoding='utf-8')

      - uses: pypa/cibuildwheel@v3.4.1
        # CIBW_ENVIRONMENT: MY_LIB_PATH="/usr/local/lib"  # 取消注释并按需配置

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ env.PACKAGE_NAME }}-${{ matrix.os }}
          path: wheelhouse/*.whl

  release:
    needs: build_wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-${{ env.PACKAGE_NAME }}-*
          merge-multiple: true
          path: dist

      - name: 删除旧 Release 与 Tag
        uses: actions/github-script@v8
        env:
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const packageName = process.env.PACKAGE_NAME;
            const stableTag = process.env.RELEASE_TAG;

            function shouldDelete(tag) {
              return tag === stableTag || tag === `${packageName}-latest` || tag.startsWith(`${packageName}-v`);
            }

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            for (const release of releases) {
              const tag = release.tag_name;
              if (!shouldDelete(tag)) {
                continue;
              }
              await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id });
              core.info(`Deleted release for ${tag}`);
            }

            const { data: refs } = await github.rest.git.listMatchingRefs({
              owner,
              repo,
              ref: `tags/${packageName}`,
            });

            for (const ref of refs) {
              const tag = ref.ref.replace('refs/tags/', '');
              if (!shouldDelete(tag)) {
                continue;
              }
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Deleted tag ${tag}`);
            }

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: "${{ env.PACKAGE_NAME }} v${{ inputs.version }}"
          overwrite_files: true
          files: |
            dist/*.whl

  update-index:
    needs: release
    uses: ./.github/workflows/update-index.yml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write
