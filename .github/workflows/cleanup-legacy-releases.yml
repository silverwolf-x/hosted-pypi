name: Cleanup Legacy Releases

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 删除历史遗留 tag / Release
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const packages = ['a', 'b', 'talib'];

            function isLegacyTag(tag) {
              return packages.some((pkg) => tag === `${pkg}-latest` || tag.startsWith(`${pkg}-v`));
            }

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            for (const release of releases) {
              if (!isLegacyTag(release.tag_name)) {
                continue;
              }
              await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id });
              core.info(`Deleted release for ${release.tag_name}`);
            }

            for (const pkg of packages) {
              const { data: refs } = await github.rest.git.listMatchingRefs({
                owner,
                repo,
                ref: `tags/${pkg}`,
              });

              for (const ref of refs) {
                const tag = ref.ref.replace('refs/tags/', '');
                if (!isLegacyTag(tag)) {
                  continue;
                }
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
                core.info(`Deleted tag ${tag}`);
              }
            }