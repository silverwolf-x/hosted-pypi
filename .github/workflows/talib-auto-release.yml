name: Auto-Release TA-Lib on Dependabot PR Merge

# 当 Dependabot 更新 talib-requirements.txt 的 PR 被合并时，
# 自动触发构建并发布新版本的 TA-Lib wheels。

on:
  pull_request:
    types: [closed]
    paths:
      - ".github/talib-requirements.txt"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-release:
    # 仅在 Dependabot PR 被合并时触发（排除手动关闭的 PR）
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'dependabot/')
    uses: ./.github/workflows/talib.yml
    secrets: inherit
