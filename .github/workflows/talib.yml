name: Build TA-Lib Wheels

# ──────────────────────────────────────────────────────────────────────────────
# Trigger                                                                       
#   workflow_dispatch  — 手动触发                                                
#   pull_request       — Dependabot 更新 talib-requirements.txt（Python 版本）  
#                        或 update-talib-c-version.yml PR 更新 talib-c-requirements.txt
#                        （C 库版本）并合并后自动触发                            
# ──────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    paths:
      - ".github/talib-requirements.txt"
      - ".github/talib-c-requirements.txt"

env:
  # ── Python 构建目标：最新 3 个 CPython 维护版本 ───────────────────────────
  # 由 .github/workflows/update-python-versions.yml 每周自动滚动更新（开 PR）
  CIBW_BUILD: "cp312-* cp313-* cp314-*"
  CIBW_BUILD_VERBOSITY: 2
  CIBW_SKIP: "*-musllinux_*"
  MSBUILDTREATHIGHERTOOLSVERSIONASCURRENT: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── 1. 从版本文件中读取 Python 包版本与 C 库版本 ──────────────────────────
  prepare:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      talib_py_ver: ${{ steps.read.outputs.talib_py_ver }}
      talib_c_ver: ${{ steps.read.outputs.talib_c_ver }}
    steps:
      - uses: actions/checkout@v6

      - name: Read versions from requirements files
        id: read
        run: |
          PY_VER=$(grep -v '^\s*#' .github/talib-requirements.txt \
            | grep -oP '(?<=ta-lib==)\S+' | head -1)
          [ -z "$PY_VER" ] && echo "::error::Cannot read ta-lib Python version" && exit 1
          echo "talib_py_ver=${PY_VER}" >> "$GITHUB_OUTPUT"

          C_VER=$(grep -v '^\s*#' .github/talib-c-requirements.txt \
            | grep -v '^$' | head -1 | tr -d '[:space:]')
          [ -z "$C_VER" ] && echo "::error::Cannot read ta-lib C version" && exit 1
          echo "talib_c_ver=${C_VER}" >> "$GITHUB_OUTPUT"

          echo "Python=${PY_VER}  C=${C_VER}"

  # ── 2. 构建 Windows AMD64 wheels ──────────────────────────────────────────
  build_windows:
    needs: prepare
    name: Windows AMD64
    runs-on: windows-latest
    env:
      TALIB_PY_VER: ${{ needs.prepare.outputs.talib_py_ver }}
      TALIB_C_VER: ${{ needs.prepare.outputs.talib_c_ver }}
      CIBW_ARCHS_WINDOWS: AMD64
      CIBW_ENVIRONMENT_WINDOWS: >-
        TALIB_C_VER="$TALIB_C_VER"
        TA_LIBRARY_PATH="ta-lib-$TALIB_C_VER\\_build;$LIB"
        TA_INCLUDE_PATH="ta-lib-$TALIB_C_VER\\include;$INCLUDE"
        PIP_NO_BUILD_ISOLATION=false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Prepare TA-Lib Python source
        shell: python
        run: |
          import json, os, shutil, tarfile, tempfile
          from pathlib import Path
          from urllib.request import urlopen, urlretrieve
          ver = os.environ['TALIB_PY_VER']
          with urlopen(f'https://pypi.org/pypi/ta-lib/{ver}/json') as r:
              data = json.load(r)
          sdist = next(u for u in data['urls'] if u['packagetype'] == 'sdist')
          fname = sdist['url'].rsplit('/', 1)[1]
          urlretrieve(sdist['url'], fname)
          dest = Path('talib-py')
          shutil.rmtree(dest, ignore_errors=True)
          dest.mkdir()
          with tempfile.TemporaryDirectory() as tmp:
              with tarfile.open(fname) as tf:
                  tf.extractall(tmp)
              top = next(Path(tmp).iterdir())
              src = top if top.is_dir() else Path(tmp)
              for item in src.iterdir():
                  (shutil.copytree if item.is_dir() else shutil.copy2)(item, dest / item.name)
          print(f'Prepared ta-lib {ver} -> talib-py/')

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Build TA-Lib C library
        shell: cmd
        run: .github\scripts\talib\build-ta-lib-windows.cmd

      - uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: talib-py
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-talib-windows
          path: wheelhouse/*.whl

  # ── 3. 构建 Linux manylinux_2_28 x86_64 wheels ────────────────────────────
  build_linux:
    needs: prepare
    name: Linux x86_64 (manylinux_2_28)
    runs-on: ubuntu-latest
    env:
      TALIB_PY_VER: ${{ needs.prepare.outputs.talib_py_ver }}
      TALIB_C_VER: ${{ needs.prepare.outputs.talib_c_ver }}
      CIBW_ARCHS_LINUX: x86_64
      CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux_2_28_x86_64
      CIBW_BEFORE_ALL_LINUX: bash /project/.github/scripts/talib/build-ta-lib-linux.sh
      CIBW_ENVIRONMENT_LINUX: >-
        TALIB_C_VER="$TALIB_C_VER"
        TA_LIBRARY_PATH="/usr/local/lib"
        TA_INCLUDE_PATH="/usr/local/include"
        PIP_NO_BUILD_ISOLATION=false
      CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
        auditwheel repair --plat manylinux_2_28_x86_64 -w {dest_dir} {wheel}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Prepare TA-Lib Python source
        shell: python
        run: |
          import json, os, shutil, tarfile, tempfile
          from pathlib import Path
          from urllib.request import urlopen, urlretrieve
          ver = os.environ['TALIB_PY_VER']
          with urlopen(f'https://pypi.org/pypi/ta-lib/{ver}/json') as r:
              data = json.load(r)
          sdist = next(u for u in data['urls'] if u['packagetype'] == 'sdist')
          fname = sdist['url'].rsplit('/', 1)[1]
          urlretrieve(sdist['url'], fname)
          dest = Path('talib-py')
          shutil.rmtree(dest, ignore_errors=True)
          dest.mkdir()
          with tempfile.TemporaryDirectory() as tmp:
              with tarfile.open(fname) as tf:
                  tf.extractall(tmp)
              top = next(Path(tmp).iterdir())
              src = top if top.is_dir() else Path(tmp)
              for item in src.iterdir():
                  (shutil.copytree if item.is_dir() else shutil.copy2)(item, dest / item.name)
          print(f'Prepared ta-lib {ver} -> talib-py/')

      - uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: talib-py
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-talib-linux
          path: wheelhouse/*.whl

  # ── 4. 发布 GitHub Release ─────────────────────────────────────────────────
  release:
    needs: [prepare, build_windows, build_linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-talib-*
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        run: cd dist && sha256sum *.whl > SHA256SUMS.txt && cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: talib-v${{ needs.prepare.outputs.talib_py_ver }}
          name: "TA-Lib v${{ needs.prepare.outputs.talib_py_ver }}"
          files: |
            dist/*.whl
            dist/SHA256SUMS.txt

  # ── 5. 更新 PyPI 静态索引 ──────────────────────────────────────────────────
  update-index:
    needs: release
    uses: ./.github/workflows/update-index.yml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write
