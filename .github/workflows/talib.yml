name: Build TA-Lib Wheels

# ──────────────────────────────────────────────────────────────────────────────
# Trigger
#   push          — 版本更新 PR（update-talib-versions / update-python-versions）
#                   合并到 dev 修改本文件时自动触发
#   workflow_dispatch — 手动触发
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [dev]
    paths:
      - ".github/workflows/talib.yml"
  workflow_dispatch:

env:
  TALIB_PY_VER: "0.6.8"        # ← update-talib-versions.yml 每周检查 PyPI 并开 PR
  TALIB_C_VER:  "0.6.4"        # ← update-talib-versions.yml 每周检查 GitHub Releases 并开 PR
  CIBW_BUILD: "cp312-* cp313-* cp314-*"  # ← update-python-versions.yml 每周更新
  CIBW_BUILD_VERBOSITY: 2
  CIBW_SKIP: "*-musllinux_*"
  MSBUILDTREATHIGHERTOOLSVERSIONASCURRENT: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── 1. 构建 Windows AMD64 wheels ──────────────────────────────────────────
  build_windows:
    name: Windows AMD64
    runs-on: windows-latest
    env:
      CIBW_ARCHS_WINDOWS: AMD64
      # $TALIB_C_VER / $GITHUB_WORKSPACE 是运行时 shell 变量，由 cibuildwheel 从宿主环境展开。
      # 不可用 ${{ env.X }}：job-level env: 块不支持 env context（会报 Unrecognized named-value）。
      # 使用绝对路径：package-dir: talib-py 改变了 cibuildwheel 内的工作目录，相对路径失效。
      CIBW_ENVIRONMENT_WINDOWS: >-
        TA_LIBRARY_PATH="$GITHUB_WORKSPACE/ta-lib-$TALIB_C_VER/_build;$LIB"
        TA_INCLUDE_PATH="$GITHUB_WORKSPACE/ta-lib-$TALIB_C_VER/include;$INCLUDE"
        PIP_NO_BUILD_ISOLATION=false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Prepare TA-Lib Python source
        shell: python
        run: |
          import json, os, shutil, tarfile, tempfile
          from pathlib import Path
          from urllib.request import urlopen, urlretrieve
          ver = os.environ['TALIB_PY_VER']
          with urlopen(f'https://pypi.org/pypi/ta-lib/{ver}/json') as r:
              data = json.load(r)
          sdist = next(u for u in data['urls'] if u['packagetype'] == 'sdist')
          fname = sdist['url'].rsplit('/', 1)[1]
          urlretrieve(sdist['url'], fname)
          dest = Path('talib-py')
          shutil.rmtree(dest, ignore_errors=True)
          dest.mkdir()
          with tempfile.TemporaryDirectory() as tmp:
              with tarfile.open(fname) as tf:
                  tf.extractall(tmp)
              top = next(Path(tmp).iterdir())
              src = top if top.is_dir() else Path(tmp)
              for item in src.iterdir():
                  (shutil.copytree if item.is_dir() else shutil.copy2)(item, dest / item.name)
          # 修复 Cython warning: __POLARS_SERIES 在 class scope 触发 name-mangling 歧义
          for f in dest.rglob('*.pxi'):
              t = f.read_text(encoding='utf-8')
              if '__POLARS_SERIES' in t:
                  f.write_text(t.replace('__POLARS_SERIES', '_POLARS_SERIES'), encoding='utf-8')
                  print(f'  patched {f}')
          print(f'Prepared ta-lib {ver} -> talib-py/')

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Build TA-Lib C library
        shell: cmd
        run: .github\scripts\talib\build-ta-lib-windows.cmd

      - uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: talib-py
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-talib-windows
          path: wheelhouse/*.whl

  # ── 2. 构建 Linux x86_64 wheels ──────────────────────────────────────────
  build_linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    env:
      # CIBW_BEFORE_ALL 在容器内独立执行，不继承 CIBW_ENVIRONMENT 中的变量；
      # 用 shell prefix 赋值传入 TALIB_C_VER（根因：TALIB_C_VER is required 报错）
      # 同理不可用 ${{ env.X }}，改用运行时变量 $TALIB_C_VER
      CIBW_BEFORE_ALL_LINUX: >-
        TALIB_C_VER=$TALIB_C_VER
        bash /project/.github/scripts/talib/build-ta-lib-linux.sh
      CIBW_ENVIRONMENT_LINUX: >-
        TA_LIBRARY_PATH="/usr/local/lib"
        TA_INCLUDE_PATH="/usr/local/include"
        PIP_NO_BUILD_ISOLATION=false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Prepare TA-Lib Python source
        shell: python
        run: |
          import json, os, shutil, tarfile, tempfile
          from pathlib import Path
          from urllib.request import urlopen, urlretrieve
          ver = os.environ['TALIB_PY_VER']
          with urlopen(f'https://pypi.org/pypi/ta-lib/{ver}/json') as r:
              data = json.load(r)
          sdist = next(u for u in data['urls'] if u['packagetype'] == 'sdist')
          fname = sdist['url'].rsplit('/', 1)[1]
          urlretrieve(sdist['url'], fname)
          dest = Path('talib-py')
          shutil.rmtree(dest, ignore_errors=True)
          dest.mkdir()
          with tempfile.TemporaryDirectory() as tmp:
              with tarfile.open(fname) as tf:
                  tf.extractall(tmp)
              top = next(Path(tmp).iterdir())
              src = top if top.is_dir() else Path(tmp)
              for item in src.iterdir():
                  (shutil.copytree if item.is_dir() else shutil.copy2)(item, dest / item.name)
          for f in dest.rglob('*.pxi'):
              t = f.read_text(encoding='utf-8')
              if '__POLARS_SERIES' in t:
                  f.write_text(t.replace('__POLARS_SERIES', '_POLARS_SERIES'), encoding='utf-8')
                  print(f'  patched {f}')
          print(f'Prepared ta-lib {ver} -> talib-py/')

      - uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: talib-py
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-talib-linux
          path: wheelhouse/*.whl

  # ── 3. 发布 GitHub Release ─────────────────────────────────────────────────
  release:
    needs: [build_windows, build_linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-talib-*
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        run: cd dist && sha256sum *.whl > SHA256SUMS.txt && cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: talib-v${{ env.TALIB_PY_VER }}
          name: "TA-Lib v${{ env.TALIB_PY_VER }}"
          files: |
            dist/*.whl
            dist/SHA256SUMS.txt

  # ── 4. 更新 PyPI 静态索引 ──────────────────────────────────────────────────
  update-index:
    needs: release
    uses: ./.github/workflows/update-index.yml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write
