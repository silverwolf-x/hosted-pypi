name: Build TA-Lib Wheels

# ──────────────────────────────────────────────────────────────────────────────
# 版本来源：.github/.env（由 update-versions.yml 每周自动更新，支持手动 dispatch）
#   TALIB_PY_VER — ta-lib Python 包版本（PyPI）
#   TALIB_C_VER  — TA-Lib C 库版本（GitHub Releases）
#   CIBW_BUILD   — 最新 3 个 CPython 稳定版本（endoflife.date）
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [dev]
    paths:
      - ".github/workflows/talib.yml"
      - ".github/.env"          # .env 版本更新合并后自动触发 wheel 重建
  workflow_dispatch:

env:
  # 版本变量由 .github/.env 在各 job 第一步加载，此处只保留静态 cibuildwheel 配置
  CIBW_BUILD_VERBOSITY: 2
  CIBW_SKIP: "*-musllinux_*"
  CIBW_BEFORE_BUILD: "pip install -U setuptools Cython wheel meson-python ninja && pip install -U numpy"
  MSBUILDTREATHIGHERTOOLSVERSIONASCURRENT: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── 1. 构建 Windows AMD64 wheels ──────────────────────────────────────────
  build_windows:
    name: Windows AMD64
    runs-on: windows-latest
    env:
      CIBW_ARCHS_WINDOWS: AMD64
      # $TALIB_C_VER 由 "Load .env" 步骤注入宿主环境；cibuildwheel 构建时从宿主 env 展开此变量。
      # job-level env: 不支持 ${{ env.X }}（Unrecognized named-value），用运行时变量。
      # 使用绝对路径：package-dir: talib-py 改变 cibuildwheel 内工作目录，相对路径失效。
      CIBW_ENVIRONMENT_WINDOWS: >-
        TA_LIBRARY_PATH="$GITHUB_WORKSPACE/ta-lib-$TALIB_C_VER/_build;$LIB"
        TA_INCLUDE_PATH="$GITHUB_WORKSPACE/ta-lib-$TALIB_C_VER/include;$INCLUDE"
        PIP_NO_BUILD_ISOLATION=false
    steps:
      - uses: actions/checkout@v6

      - name: Load versions from .env
        shell: bash
        run: cat .github/.env >> "$GITHUB_ENV"

      - name: Checkout ta-lib-python source
        uses: actions/checkout@v6
        with:
          repository: TA-Lib/ta-lib-python
          ref: v${{ env.TALIB_PY_VER }}
          path: talib-py

      - name: Patch Cython source
        shell: bash
        run: find talib-py -name '*.pxi' -exec sed -i 's/__POLARS_SERIES/_POLARS_SERIES/g' {} +

      - uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Build TA-Lib C library
        shell: cmd
        run: .github\scripts\talib\build-ta-lib-windows.cmd

      - uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: talib-py
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-talib-windows
          path: wheelhouse/*.whl

  # ── 2. 构建 Linux x86_64 wheels ───────────────────────────────────────────
  build_linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Load versions from .env
        run: cat .github/.env >> "$GITHUB_ENV"

      - name: Checkout ta-lib-python source
        uses: actions/checkout@v6
        with:
          repository: TA-Lib/ta-lib-python
          ref: v${{ env.TALIB_PY_VER }}
          path: talib-py

      - name: Patch Cython source
        run: find talib-py -name '*.pxi' -exec sed -i 's/__POLARS_SERIES/_POLARS_SERIES/g' {} +

      - uses: pypa/cibuildwheel@v3.4.1
        env:
          # step-level env: ${{ env.X }} 在步骤启动前展开为字面值。
          # CIBW_BEFORE_ALL 在 manylinux 容器内执行，容器不继承宿主 env，$TALIB_C_VER 为空。
          # 必须在此处用 ${{ env.TALIB_C_VER }} 展开为字面字符串后传入容器。
          CIBW_BEFORE_ALL_LINUX: "TALIB_C_VER=${{ env.TALIB_C_VER }} bash /project/.github/scripts/talib/build-ta-lib-linux.sh"
          CIBW_ENVIRONMENT_LINUX: >-
            TA_LIBRARY_PATH="/usr/local/lib"
            TA_INCLUDE_PATH="/usr/local/include"
            PIP_NO_BUILD_ISOLATION=false
        with:
          package-dir: talib-py
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-talib-linux
          path: wheelhouse/*.whl

  # ── 3. 发布 GitHub Release ─────────────────────────────────────────────────
  release:
    needs: [build_windows, build_linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Load versions from .env
        run: cat .github/.env >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-talib-*
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        run: cd dist && sha256sum *.whl > SHA256SUMS.txt && cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: talib-v${{ env.TALIB_PY_VER }}
          name: "TA-Lib v${{ env.TALIB_PY_VER }}"
          files: |
            dist/*.whl
            dist/SHA256SUMS.txt

  # ── 4. 更新 PyPI 静态索引 ──────────────────────────────────────────────────
  update-index:
    needs: release
    uses: ./.github/workflows/update-index.yml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write
