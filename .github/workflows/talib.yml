name: Build TA-Lib Wheels

on:
  workflow_dispatch:
  # Dependabot 更新 talib-requirements.txt 并合并 PR 后自动触发
  pull_request:
    types: [closed]
    paths:
      - ".github/talib-requirements.txt"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── 1. 读取 Python 包版本 + 自动获取最新 C 库版本 + 动态计算 CIBW_BUILD ──────
  get_version:
    # 手动触发始终运行；PR 触发仅在 Dependabot PR 被合并时运行
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'dependabot/'))
    runs-on: ubuntu-latest
    outputs:
      talib_py_ver: ${{ steps.resolve.outputs.talib_py_ver }}
      talib_c_ver: ${{ steps.resolve.outputs.talib_c_ver }}
      cibw_build: ${{ steps.resolve.outputs.cibw_build }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Resolve TA-Lib versions
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/talib/resolve_versions.py

  # ── 2. 构建 wheels（Linux manylinux_2_28_x86_64 + Windows AMD64）───────────
  build:
    needs: get_version
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      TALIB_PY_VER: ${{ needs.get_version.outputs.talib_py_ver }}
      TALIB_C_VER: ${{ needs.get_version.outputs.talib_c_ver }}
      CIBW_BUILD: ${{ needs.get_version.outputs.cibw_build }}
      CIBW_SKIP: "*-musllinux_*"
      CIBW_BUILD_VERBOSITY: 2
      CIBW_ARCHS_LINUX: x86_64
      CIBW_ARCHS_WINDOWS: AMD64
      CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux_2_28_x86_64
      CIBW_BEFORE_ALL_LINUX: bash /project/.github/scripts/talib/build-ta-lib-linux.sh
      CIBW_ENVIRONMENT_LINUX: >-
        TALIB_C_VER="$TALIB_C_VER"
        TA_LIBRARY_PATH="/usr/local/lib"
        TA_INCLUDE_PATH="/usr/local/include"
        PIP_NO_BUILD_ISOLATION=false
      CIBW_ENVIRONMENT_WINDOWS: >-
        TALIB_C_VER="$TALIB_C_VER"
        TA_LIBRARY_PATH="ta-lib-$TALIB_C_VER\\_build;$LIB"
        TA_INCLUDE_PATH="ta-lib-$TALIB_C_VER\\include;$INCLUDE"
        PIP_NO_BUILD_ISOLATION=false
      CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
        auditwheel repair --plat manylinux_2_28_x86_64 -w {dest_dir} {wheel}
      MSBUILDTREATHIGHERTOOLSVERSIONASCURRENT: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Prepare TA-Lib Python source
        run: python .github/scripts/talib/prepare_source.py

      - name: Setup MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Build TA-Lib C library (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: .github\scripts\talib\build-ta-lib-windows.cmd

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: talib-py
          output-dir: wheelhouse
        env:
          CIBW_BEFORE_ALL_LINUX: ${{ env.CIBW_BEFORE_ALL_LINUX }}
          CIBW_ENVIRONMENT_LINUX: ${{ env.CIBW_ENVIRONMENT_LINUX }}
          CIBW_ENVIRONMENT_WINDOWS: ${{ env.CIBW_ENVIRONMENT_WINDOWS }}
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: ${{ env.CIBW_REPAIR_WHEEL_COMMAND_LINUX }}

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-talib-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ── 3. 发布 GitHub Release ─────────────────────────────────────────────────
  release:
    needs: [get_version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-talib-*
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        run: cd dist && sha256sum *.whl > SHA256SUMS.txt && cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: talib-v${{ needs.get_version.outputs.talib_py_ver }}
          name: "TA-Lib v${{ needs.get_version.outputs.talib_py_ver }}"
          files: |
            dist/*.whl
            dist/SHA256SUMS.txt

  # ── 4. 更新 PyPI 静态索引 ──────────────────────────────────────────────────
  update-index:
    needs: release
    uses: ./.github/workflows/update-index.yml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write
  