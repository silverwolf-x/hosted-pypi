name: Update CIBW_BUILD to Latest Python Versions

# 每周自动检查 Python 最新3个维护版本，若 CIBW_BUILD 需要更新则开 PR。
# 这弥补了 Dependabot 无法更新 workflow env 变量中 Python 版本的不足。

on:
  schedule:
    - cron: "0 9 * * 1"  # 每周一 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-python-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute new CIBW_BUILD and patch workflow files
        id: update
        shell: bash
        run: |
          python3 <<'PYEOF'
          import os, re, json, glob
          from datetime import date
          from urllib.request import urlopen

          with urlopen("https://endoflife.date/api/python.json") as r:
              data = json.load(r)

          today = date.today().isoformat()
          supported = []
          for item in data:
              cycle  = item.get("cycle", "")
              eol    = item.get("eol", "")
              latest = item.get("latest", "")
              if not cycle.startswith("3."):
                  continue
              if (isinstance(eol, bool) and eol) or (isinstance(eol, str) and eol <= today):
                  continue
              # 跳过 alpha/beta/rc
              if re.search(r"[a-zA-Z]", latest):
                  continue
              try:
                  minor = int(cycle.split(".")[1])
                  supported.append((minor, cycle))
              except (IndexError, ValueError):
                  continue

          supported.sort(key=lambda x: x[0], reverse=True)
          top3 = sorted([v[1] for v in supported[:3]], key=lambda v: int(v.split(".")[1]))
          cibw = " ".join(f"cp{v.replace('.','')}-*" for v in top3)
          print(f"Latest 3 versions: {top3}")
          print(f"New CIBW_BUILD: {cibw}")

          changed = False
          pat = r'(CIBW_BUILD:\s*["\'])([^"\']+)(["\'])'
          for path in sorted(glob.glob(".github/workflows/*.yml")):
              with open(path, encoding="utf-8") as f:
                  content = f.read()
              m = re.search(pat, content)
              if m and m.group(2) != cibw:
                  new = re.sub(pat, lambda mo: mo.group(1) + cibw + mo.group(3), content)
                  with open(path, "w", encoding="utf-8") as f:
                      f.write(new)
                  print(f"  Patched {path}: {m.group(2)!r} -> {cibw!r}")
                  changed = True

          if not changed:
              print("Already up-to-date.")

          out = os.environ.get("GITHUB_OUTPUT", "")
          if out:
              with open(out, "a") as f:
                  f.write(f"cibw_build={cibw}\n")
                  f.write(f"changed={'true' if changed else 'false'}\n")
          PYEOF

      - name: Create Pull Request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-python-versions
          commit-message: "chore: update CIBW_BUILD to ${{ steps.update.outputs.cibw_build }}"
          title: "chore: update CIBW_BUILD to latest 3 Python versions"
          body: |
            ## 自动 Python 版本更新

            由 [`update-python-versions`](.github/workflows/update-python-versions.yml) 自动生成。

            **新 `CIBW_BUILD` 值：**
            ```
            ${{ steps.update.outputs.cibw_build }}
            ```

            数据来源：[endoflife.date/python](https://endoflife.date/python)
          labels: python-version-update
          delete-branch: true
