name: Update TA-Lib C Version

# ──────────────────────────────────────────────────────────────────────────────
# 每周检查 TA-Lib C 库（github.com/TA-Lib/ta-lib）是否有新版本发布；
# 若检测到新版本则更新 .github/talib-c-requirements.txt 并开 PR。
# PR 合并后，talib.yml 的 pull_request 触发器自动执行 wheel 重建与发布。
# ──────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 9 * * 1"   # 每周一 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-c-version:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check latest TA-Lib C release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/TA-Lib/ta-lib/releases/latest" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
          [ -z "$LATEST" ] && echo "::error::Unable to get latest TA-Lib C version" && exit 1

          CURRENT=$(grep -v '^\s*#' .github/talib-c-requirements.txt \
            | grep -v '^$' | head -1 | tr -d '[:space:]')

          echo "latest=${LATEST}"   >> "$GITHUB_OUTPUT"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "TA-Lib C: current=${CURRENT}, latest=${LATEST}"

      - name: Update talib-c-requirements.txt
        if: steps.check.outputs.changed == 'true'
        env:
          LATEST: ${{ steps.check.outputs.latest }}
        run: |
          {
            echo "# TA-Lib C library version"
            echo "# Updated automatically by .github/workflows/update-talib-c-version.yml"
            echo "# Merging a PR that changes this file triggers wheel rebuilds via talib.yml"
            echo "${LATEST}"
          } > .github/talib-c-requirements.txt

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-talib-c-version
          commit-message: "chore(talib): update TA-Lib C ${{ steps.check.outputs.current }} → ${{ steps.check.outputs.latest }}"
          title: "chore(talib): update TA-Lib C ${{ steps.check.outputs.current }} → ${{ steps.check.outputs.latest }}"
          body: |
            Bumps TA-Lib C library from `${{ steps.check.outputs.current }}` to `${{ steps.check.outputs.latest }}`.

            Merging this PR will trigger an automatic wheel rebuild and release via `talib.yml`.
          labels: talib-update
          delete-branch: true
