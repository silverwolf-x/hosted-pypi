name: Update TA-Lib Versions

# ──────────────────────────────────────────────────────────────────────────────
# 每周检查 ta-lib Python 包（PyPI）和 ta-lib C 库（GitHub Releases）是否有新版本；
# 若检测到更新，直接修改 talib.yml 中的 TALIB_PY_VER / TALIB_C_VER 并开 PR。
# PR 合并到 main 后，talib.yml 的 push 触发器自动执行 wheel 重建与发布。
# ──────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 9 * * 1"   # 每周一 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check and update versions
        id: update
        env:
          GH_TOKEN: ${{ github.token }}
        shell: python
        run: |
          import json, os, re
          import urllib.request
          from urllib.request import urlopen

          wf_path = '.github/workflows/talib.yml'
          wf = open(wf_path, encoding='utf-8').read()

          # ── PyPI: latest ta-lib Python version ──────────────────────────────
          with urlopen('https://pypi.org/pypi/ta-lib/json') as r:
              py_latest = json.load(r)['info']['version']
          py_cur = re.search(r'TALIB_PY_VER:\s*["\']([^"\']+)', wf).group(1)

          # ── GitHub Releases: latest ta-lib C version ────────────────────────
          req = urllib.request.Request(
              'https://api.github.com/repos/TA-Lib/ta-lib/releases/latest',
              headers={
                  'Authorization': f'Bearer {os.environ["GH_TOKEN"]}',
                  'Accept': 'application/vnd.github+json',
              }
          )
          try:
              with urlopen(req) as r:
                  c_latest = json.load(r)['tag_name'].lstrip('v')
          except Exception:
              # Fallback: parse version from redirect URL (rate limit without token)
              req2 = urllib.request.Request(
                  'https://github.com/TA-Lib/ta-lib/releases/latest'
              )
              try:
                  with urlopen(req2) as r:
                      c_latest = r.url.rsplit('/', 1)[-1].lstrip('v')
              except Exception as exc:
                  print(f'::error::Unable to fetch ta-lib C version: {exc}')
                  raise SystemExit(1)
          c_cur = re.search(r'TALIB_C_VER:\s*["\']([^"\']+)', wf).group(1)

          changed = []
          if py_latest != py_cur:
              wf = re.sub(
                  r'(TALIB_PY_VER:\s*["\'])([^"\']+)',
                  rf'\g<1>{py_latest}', wf, count=1)
              changed.append(f'Python {py_cur} -> {py_latest}')
          if c_latest != c_cur:
              wf = re.sub(
                  r'(TALIB_C_VER:\s*["\'])([^"\']+)',
                  rf'\g<1>{c_latest}', wf, count=1)
              changed.append(f'C {c_cur} -> {c_latest}')

          if changed:
              open(wf_path, 'w', encoding='utf-8').write(wf)

          summary = '; '.join(changed) if changed else 'no change'
          out = os.environ.get('GITHUB_OUTPUT', '')
          if out:
              with open(out, 'a') as f:
                  f.write(f'changed={"true" if changed else "false"}\n')
                  f.write(f'summary={summary}\n')
          print(f'changed={bool(changed)}  {summary}')

      - name: Create Pull Request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-talib-versions
          commit-message: "chore(talib): ${{ steps.update.outputs.summary }}"
          title: "chore(talib): bump ${{ steps.update.outputs.summary }}"
          body: |
            Automated version update: **${{ steps.update.outputs.summary }}**

            Merging this PR will trigger an automatic wheel rebuild and release via `talib.yml`.
          labels: talib-update
          delete-branch: true
