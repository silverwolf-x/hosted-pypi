[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "b"
version = "2.1.1"
description = "Example compiled package B with native extension"
requires-python = ">=3.9"
license = "MIT"

[tool.cibuildwheel]
build = "cp310-* cp311-* cp312-*"
skip = "*-musllinux_*"
